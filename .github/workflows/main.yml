on:
  push:
    branches:
      - main
  pull_request:
    types: [closed]
    branches:
      - main

name: Bundle and Publish Sources

jobs:
  build:
    name: Bundle and Publish Sources
    runs-on: ubuntu-latest

    strategy:
      matrix:
        node-version: [22.x] # Updated to stable Node 22 to bypass Node 20 deprecation

    steps:
      - name: Checkout Branch
        uses: actions/checkout@v4 # Updated from v2 to v4

      - name: Setup Node.js environment
        uses: actions/setup-node@v4 # Updated from v1 to v4
        with:
          node-version: ${{ matrix.node-version }}

      - run: npm install
      - run: npm run bundle

      - name: Deploy
        uses: s0/git-publish-subdir-action@master
        env:
          REPO: self
          BRANCH: gh-pages
          FOLDER: bundles
          GITHUB_TOKEN: ${{ secrets.TOKEN }}